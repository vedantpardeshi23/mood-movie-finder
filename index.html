<!DOCTYPE html>
<html>
<head>
  <title>Mood Movie Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Mood Movie Finder 🎬</h1>

  <p>How are you feeling today?</p>

  <!-- Mood Buttons -->
  <button class="mood-btn" data-mood="Happy" onclick="chooseMood('Happy')">Happy</button>
  <button class="mood-btn" data-mood="Sad" onclick="chooseMood('Sad')">Sad</button>
  <button class="mood-btn" data-mood="Excited" onclick="chooseMood('Excited')">Excited</button>
  <button class="mood-btn" data-mood="Chill" onclick="chooseMood('Chill')">Chill</button>

  <br><br>

  <!-- Search + Sort -->
  <div id="controls" style="display:none;">
    <input type="text" id="searchBox" placeholder="Search movies" onkeyup="filterMovies()">

    <select id="sortSelect" onchange="sortMovies()">
      <option value="default">Sort By</option>
      <option value="rating">Rating</option>
      <option value="popularity">Popularity</option>
    </select>
  </div>

  <!-- Loading -->
  <div id="spinner" style="display:none;">
    <p>Loading movies...</p>
  </div>

  <!-- Movies -->
  <div id="movieGrid"></div>

  <!-- No results -->
  <p id="noResults" style="display:none;">No movies found</p>

  <script src="script.js"></script>

</body>
</html>
